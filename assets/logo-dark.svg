<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    kilnx logo: dark background variant
    Kiln dome in light gray, furnace opening darker, X in accent orange.
  -->

  <!-- Kiln dome body -->
  <path fill="#e8e8e8" d="
    M 128 420
    L 128 210
    Q 128 80, 256 60
    Q 384 80, 384 210
    L 384 420
    Z
  "/>

  <!-- Furnace opening: slightly darker arch -->
  <path fill="#cccccc" d="
    M 192 420
    L 192 310
    Q 192 250, 256 235
    Q 320 250, 320 310
    L 320 420
    Z
  "/>

  <!-- X inside the furnace -->
  <g stroke="#e85d25" stroke-width="18" stroke-linecap="round">
    <line x1="218" y1="280" x2="294" y2="390"/>
    <line x1="294" y1="280" x2="218" y2="390"/>
  </g>

  <!-- Heat shimmer lines above dome -->
  <g stroke="#e8e8e8" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M 232 50 Q 228 35, 233 18"/>
    <path d="M 256 44 Q 252 26, 257 8"/>
    <path d="M 280 50 Q 276 35, 281 18"/>
  </g>
</svg>
