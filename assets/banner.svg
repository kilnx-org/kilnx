<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <!--
    kilnx banner: for README headers and social cards.
    Logo mark on the left, wordmark + tagline on the right.
  -->
  <defs>
    <style>
      .wordmark { font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 700; font-size: 128px; letter-spacing: -4px; }
      .tagline { font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 300; font-size: 24px; letter-spacing: 0.5px; }
    </style>
  </defs>

  <!-- Logo mark, scaled to fit left column -->
  <g transform="translate(40, 18) scale(0.7)">
    <!-- Kiln dome body -->
    <path fill="#1a1a1a" d="
      M 128 420
      L 128 210
      Q 128 80, 256 60
      Q 384 80, 384 210
      L 384 420
      Z
    "/>

    <!-- Furnace opening -->
    <path fill="#2a2a2a" d="
      M 192 420
      L 192 310
      Q 192 250, 256 235
      Q 320 250, 320 310
      L 320 420
      Z
    "/>

    <!-- X inside the furnace -->
    <g stroke="#e85d25" stroke-width="18" stroke-linecap="round">
      <line x1="218" y1="280" x2="294" y2="390"/>
      <line x1="294" y1="280" x2="218" y2="390"/>
    </g>

    <!-- Heat shimmer lines -->
    <g stroke="#1a1a1a" stroke-width="5" stroke-linecap="round" fill="none">
      <path d="M 232 50 Q 228 35, 233 18"/>
      <path d="M 256 44 Q 252 26, 257 8"/>
      <path d="M 280 50 Q 276 35, 281 18"/>
    </g>
  </g>

  <!-- Wordmark: "kiln" in dark, "x" in accent -->
  <text x="400" y="230" class="wordmark">
    <tspan fill="#1a1a1a">kiln</tspan><tspan fill="#e85d25">x</tspan>
  </text>

  <!-- Tagline -->
  <text x="406" y="278" class="tagline" fill="#777777">the backend language for the htmx era</text>
</svg>
