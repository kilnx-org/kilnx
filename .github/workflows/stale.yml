name: Stale

on:
  schedule:
    - cron: "0 6 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 14 days
            unless there is new activity. If this is still relevant, please comment.
          stale-pr-message: >
            This PR has been inactive for 30 days. It will be closed in 14 days
            unless there is new activity.
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 14
          days-before-pr-close: 14
          exempt-issue-labels: "phase:0-hardening,phase:1-credibility,phase:2-adoption,phase:3-escape-hatch,security"
          exempt-pr-labels: "security"
