name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CLI
        run: go build -o kilnx ./cmd/kilnx/

      - name: Unit tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CLI
        run: go build -o kilnx ./cmd/kilnx/

      - name: Check examples (hello)
        run: ./kilnx check smoke/hello.kilnx

  kilnx-build:
    name: Build Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CLI
        run: go build -o kilnx ./cmd/kilnx/

      - name: Build hello example
        run: ./kilnx build smoke/hello.kilnx -o hello

      - name: Verify binaries exist
        run: |
          test -f hello && echo "hello binary OK ($(du -h hello | cut -f1))"

      - name: Verify hello binary starts and serves /healthz
        run: |
          ./hello &
          PID=$!
          sleep 2
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/healthz)
          kill $PID
          if [ "$STATUS" != "200" ]; then
            echo "healthz returned $STATUS, expected 200"
            exit 1
          fi
          echo "healthz OK"

      - name: Verify PORT env var
        run: |
          PORT=9090 ./hello &
          PID=$!
          sleep 2
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9090/healthz)
          kill $PID
          if [ "$STATUS" != "200" ]; then
            echo "PORT=9090 healthz returned $STATUS, expected 200"
            exit 1
          fi
          echo "PORT override OK"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          only-new-issues: true

      - name: Check formatting (gofumpt + goimports)
        run: golangci-lint fmt --diff

  validate-docs:
    name: Validate generated docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Regenerate docs
        run: go run ./cmd/kilnx-gendocs -o /tmp/kilnx-docs-fresh

      - name: Diff reference against committed docs
        run: |
          if ! diff -r docs/devs/reference /tmp/kilnx-docs-fresh/devs/reference > /tmp/ref-diff.txt; then
            echo "::error::docs/devs/reference is out of sync with internal/spec."
            echo "Run 'go generate ./...' locally and commit the result."
            cat /tmp/ref-diff.txt
            exit 1
          fi

      - name: Diff packages against committed docs
        run: |
          if ! diff -r docs/contributors/packages /tmp/kilnx-docs-fresh/contributors/packages > /tmp/pkg-diff.txt; then
            echo "::error::docs/contributors/packages is out of sync with internal/* source."
            echo "Run 'go generate ./...' locally and commit the result."
            cat /tmp/pkg-diff.txt
            exit 1
          fi

      - name: Check for stale entries
        run: go run ./cmd/kilnx-gendocs -check-stale -o /tmp/kilnx-docs-stale-check

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg KILNX_FILE=smoke/hello.kilnx \
            -t kilnx-test .

      - name: Test Docker image
        run: |
          docker run -d -p 8080:8080 -e PORT=8080 --name kilnx-test kilnx-test
          sleep 2
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/healthz)
          docker logs kilnx-test
          docker stop kilnx-test
          if [ "$STATUS" != "200" ]; then
            echo "Docker healthz returned $STATUS, expected 200"
            exit 1
          fi
          echo "Docker image OK"
