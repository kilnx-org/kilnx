name: Auto-regen docs post-merge

# Regenerates docs/devs/reference and docs/contributors/packages after every
# merge to main. Why: every merge that touches internal/spec/*_spec.go or
# internal/*/doc.go invalidates the SHA provenance in already-committed
# generated docs. Running gendocs in CI and committing the bump keeps the
# tree authoritative without requiring contributors to remember `go generate`
# after each rebase.
#
# Pushes use GITHUB_TOKEN, which by design does NOT trigger downstream
# workflows. That gives us natural loop protection: the regen commit lands
# on main but does not re-fire this workflow.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  regen:
    if: "${{ !startsWith(github.event.head_commit.message, 'docs: regen post-merge') }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Regenerate docs
        run: go generate ./...

      - name: Commit and push if drift exists
        run: |
          if git diff --quiet -- docs/; then
            echo "No drift, nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/
          git commit -m "docs: regen post-merge

          Auto-bumps SHA provenance in docs/devs/reference and
          docs/contributors/packages after a merge that touched spec
          or doc.go files. Generated by .github/workflows/post-merge-regen.yml."

          git push
