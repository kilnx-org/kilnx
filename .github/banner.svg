<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#ff6e40" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#e64a19" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="45%" r="20%">
      <stop offset="0%" stop-color="#e64a19" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e64a19" stop-opacity="0"/>
      <stop offset="30%" stop-color="#e64a19" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#ff6e40" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#e64a19" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e64a19" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="botLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#27272a" stop-opacity="0"/>
      <stop offset="20%" stop-color="#27272a" stop-opacity="1"/>
      <stop offset="80%" stop-color="#27272a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#27272a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="#09090b"/>

  <!-- Grid pattern (inline, no pattern element for GitHub compat) -->
  <g stroke="rgba(255,255,255,0.025)" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/><line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/><line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/><line x1="800" y1="0" x2="800" y2="200"/>
  </g>

  <!-- Orange glow (layered ellipses instead of filter blur) -->
  <ellipse cx="450" cy="90" rx="320" ry="100" fill="url(#glow)"/>
  <ellipse cx="450" cy="90" rx="200" ry="60" fill="url(#glow2)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="900" height="1.5" fill="url(#topLine)"/>

  <!-- Main title -->
  <text x="450" y="100" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="#fafafa" letter-spacing="-2">kilnx</text>

  <!-- Subtitle -->
  <text x="450" y="140" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#a1a1aa" letter-spacing="0.5">The backend language for the htmx era</text>

  <!-- Bottom border -->
  <rect x="0" y="198.5" width="900" height="1.5" fill="url(#botLine)"/>

  <!-- Corner accents -->
  <path d="M0,0 L50,0" stroke="#e64a19" stroke-opacity="0.3" stroke-width="1" fill="none"/>
  <path d="M0,0 L0,50" stroke="#e64a19" stroke-opacity="0.3" stroke-width="1" fill="none"/>
  <path d="M850,0 L900,0" stroke="#e64a19" stroke-opacity="0.3" stroke-width="1" fill="none"/>
  <path d="M900,0 L900,50" stroke="#e64a19" stroke-opacity="0.3" stroke-width="1" fill="none"/>
  <path d="M0,200 L50,200" stroke="#e64a19" stroke-opacity="0.3" stroke-width="1" fill="none"/>
  <path d="M0,150 L0,200" stroke="#e64a19" stroke-opacity="0.3" stroke-width="1" fill="none"/>
  <path d="M850,200 L900,200" stroke="#e64a19" stroke-opacity="0.3" stroke-width="1" fill="none"/>
  <path d="M900,150 L900,200" stroke="#e64a19" stroke-opacity="0.3" stroke-width="1" fill="none"/>
</svg>