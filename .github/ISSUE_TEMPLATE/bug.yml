name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal .kilnx to reproduce
      description: Paste the smallest .kilnx file that triggers the bug.
      render: kilnx
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Kilnx version
      description: Output of `kilnx version`
      placeholder: "v0.1.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Linux x86_64 / macOS arm64 / Windows"
    validations:
      required: false
