version: 2

project_name: kilnx

builds:
  - main: ./cmd/kilnx/
    binary: kilnx
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: kilnx-org
    name: kilnx
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"

brews:
  - repository:
      owner: kilnx-org
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://kilnx.org"
    description: "Declarative backend language for the htmx era"
    license: "MIT"
    test: |
      system "#{bin}/kilnx", "version"

changelog:
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^style:"
      - "^chore:"
